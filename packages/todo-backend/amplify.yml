version: 1
backend:
  phases:
    build:
      commands:
        - npm install -g pnpm
        - pnpm install
        - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - mkdir -p .noop && echo "backend-only" > .noop/index.html
  artifacts:
    baseDirectory: .noop
    files:
      - '**/*'
