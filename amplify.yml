version: 1
applications:
  # ── Platform (auth, shared infra) ────────────────────────────────────────────
  # Stable resources. Deploy from main/release ONLY.
  # In the Amplify console: New app → appRoot = packages/platform
  - appRoot: packages/platform
    backend:
      phases:
        build:
          commands:
            - npm install -g pnpm tsdown
            - pnpm install
            - node -e "const {execSync}=require('child_process'),{dirname}=require('path');execSync('tsdown src/index.ts --format esm,cjs --dts --clean',{cwd:dirname(require.resolve('derrops-conventions/package.json')),stdio:'inherit'})"
            - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - mkdir -p .noop && echo "backend-only" > .noop/index.html
      artifacts:
        baseDirectory: .noop
        files:
          - '**/*'

  # ── Todo backend (data models) ───────────────────────────────────────────────
  # Per-feature resources. Deploy from any branch.
  # In the Amplify console: New app → appRoot = packages/todo-backend
  - appRoot: packages/todo-backend
    backend:
      phases:
        build:
          commands:
            - npm install -g pnpm tsdown
            - pnpm install
            - node -e "const {execSync}=require('child_process'),{dirname}=require('path');execSync('tsdown src/index.ts --format esm,cjs --dts --clean',{cwd:dirname(require.resolve('derrops-conventions/package.json')),stdio:'inherit'})"
            - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - mkdir -p .noop && echo "backend-only" > .noop/index.html
      artifacts:
        baseDirectory: .noop
        files:
          - '**/*'

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # In the Amplify console: New app → appRoot = apps/todo-app
  # Set env var TODO_BACKEND_APP_ID to the Amplify App ID of the todo-backend app.
  - appRoot: apps/todo-app
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - pnpm install
            # Pull todo-backend outputs (includes auth + data config)
            - pnpm exec ampx generate outputs --branch $AWS_BRANCH --app-id $TODO_BACKEND_APP_ID --out-dir ../../packages/todo-backend
        build:
          commands:
            - npm run build -w apps/todo-app
      artifacts:
        baseDirectory: apps/todo-app/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
